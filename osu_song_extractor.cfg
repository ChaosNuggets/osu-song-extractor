# See docs/configuration.md for configuration guide

[General]
input_dir = "~/Music/Songs" # Change this to your songs folder location
output_dir = "~/Music/Extracted-Songs" # Change this to whatever you want your output location to be
#export_into_subfolders = True
#subfolder_name = "<Artist> - <Title> <BeatmapSetID>"
#illegal_char_override = "-"

[one_bg_one_song]
#export_into_deep_subfolder = False
#deep_subfolder_name = "<Version>"
#overwrite_existing_files = False
#song_filename = "<Artist> - <Title>"
#meta_write_mode = IF_MISSING
#title_meta = "<Title>"
#artist_meta = "<Artist>"
#bg_export_mode = AS_SEPARATE
#bg_filename = "<BackgroundFilename>"

[mult_bg_one_song]
#export_into_deep_subfolder = False
#deep_subfolder_name = "<Version>"
#overwrite_existing_files = False
#song_filename = "<Artist> - <Title>"
#meta_write_mode = IF_MISSING
#title_meta = "<Title>"
#artist_meta = "<Artist>"
#bg_export_mode = AS_SEPARATE
#bg_filename = "<BackgroundFilename>"

[one_bg_mult_song]
#export_into_deep_subfolder = False
#deep_subfolder_name = "<Version>"
#overwrite_existing_files = False
#song_filename = "<Artist> - <Title> [<Version>]"
#meta_write_mode = IF_MISSING
#title_meta = "<Title> [<Version>]"
#artist_meta = "<Artist>"
#bg_export_mode = AS_SEPARATE
#bg_filename = "<BackgroundFilename>"

[mult_bg_mult_song]
#export_into_deep_subfolder = True
#deep_subfolder_name = "<Version>"
#overwrite_existing_files = False
#song_filename = "<Artist> - <Version>"
#meta_write_mode = IF_MISSING
#title_meta = "<Version>"
#artist_meta = "<Artist>"
#bg_export_mode = AS_SEPARATE
#bg_filename = "<BackgroundFilename>"
