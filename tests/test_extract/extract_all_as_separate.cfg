[General]
# Change this to your songs folder location
input_dir="tests/test_extract/Songs"
# Change this to whatever you want your output location to be
output_dir="tests/test_extract/Extracted_Songs_As_Separate"
export_into_subfolders = True

[One_Song]
export_into_deep_subfolder = False
song_filename = "<Artist> - <Title>"
bg_export_mode = AS_SEPARATE

[Rates]
export_into_deep_subfolder = False
song_filename = "<Artist> - <Title> [<Version>]"
bg_export_mode = AS_SEPARATE

[Map_Pack]
export_into_deep_subfolder = True
song_filename = "<AudioFilename>"
bg_export_mode = AS_SEPARATE
