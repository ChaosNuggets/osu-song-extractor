[General]
# Change this to your songs folder location
input_dir="tests/test_extract/Songs"
# Change this to whatever you want your output location to be
output_dir="tests/test_extract/Extracted_Songs_As_Meta"
export_into_subfolders = False

[One_Song]
export_into_deep_subfolder = False
song_filename = "<Artist> - <Title> <BeatmapID>"
bg_export_mode = AS_META_IF_MISSING

[Rates]
export_into_deep_subfolder = False
song_filename = "<Artist> - <Title> [<Version>] <BeatmapID>"
bg_export_mode = AS_META_IF_MISSING

[Map_Pack]
export_into_deep_subfolder = False
song_filename = "<Artist> - <Version> <BeatmapID>"
bg_export_mode = AS_META_IF_MISSING
