[General]
input_dir = "C:\Users\chaos\AppData\Local\osu!\Songs"
output_dir = "C:\Users\chaos\Music\Extracted-Songs\"
export_into_subfolders = True
subfolder_name = "<Artist> - <Title> <BeatmapSetID>"
illegal_char_override = "-"
beatmap_type_cutoff = 6.7

[One_Song]
export_into_deep_subfolder = false
deep_subfolder_name = "<Version>"
overwrite_existing_files = False
song_filename = "<Artist> - <Title>"
meta_write_mode = IF_MISSING 
title_meta = "<Title>"
artist_meta="<Artist>"
bg_export_mode =AS_SEPARATE
bg_filename = <BackgroundFilename>

[Rates]
export_into_deep_subfolder = true
deep_subfolder_name = "<AudioFilename>"
overwrite_existing_files = True

song_filename = " <BackgroundFilename> <BeatmapID>"
meta_write_mode = ALWAYS
title_meta = "EEE <ooga booga>"
artist_meta = "< lol"
bg_export_mode = AS_META_IF_MISSING

[Map_Pack]
song_filename = "<BeatmapSetID> <BeatmapID> <AudioFilename>"
